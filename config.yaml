# ============================================================
# Paperpulse — central configuration
# ============================================================
# Edit this file to change what gets searched, how summaries
# are written, and how the blog is branded.
# Environment-sensitive secrets (API keys, etc.) stay in .env
# ============================================================

blog:
  title: "Engineering Research Pulse"
  tagline: "Daily summaries of AI-aided engineering research"
  description: >-
    Daily ArXiv paper summaries focused on agentic engineering,
    AI-aided design, simulation, and engineering automation.
  # Used as the Jekyll front-matter title for each post
  post_title: "Daily AI-Aided Engineering Research Summary"

search:
  # ArXiv category codes — https://arxiv.org/category_taxonomy
  # Papers must belong to at least one of these categories (when mode includes categories).
  categories:
    - cs.SE    # Software Engineering
    - cs.RO    # Robotics
    - eess.SY  # Systems and Control
    - cs.MA    # Multiagent Systems
    - cs.AI    # Artificial Intelligence
    - cs.CE    # Computational Engineering, Finance, and Science

  # Free-text keyword filters — searched across title and abstract.
  # Papers must match at least one keyword (when mode includes keywords).
  keywords:
    - agentic
    - AI-aided design
    - CAD automation
    - engineering pipeline
    - digital twin
    - autonomous engineering
    - LLM agent
    - agentic pipeline
    - workflow automation
    - simulation framework
    - generative design
    - engineering automation

  # How to combine categories and keywords into the ArXiv query:
  #   categories_and_keywords — paper must match a category AND a keyword  (most precise)
  #   categories_only         — category filter only                        (broader)
  #   keywords_only           — keyword filter only, ignores categories     (broadest)
  mode: categories_and_keywords

summarization:
  # Injected as the opening of every system/user prompt.
  # Change this to shift the expertise framing of the LLM.
  persona: >
    You are a research scientist and professor specialising in AI-aided engineering,
    agentic systems, and engineering automation. You have deep expertise in areas such
    as computational design, robotic process automation, digital twins, LLM-based
    engineering agents, CAD automation, and simulation-driven workflows.

  # Injected after the persona. Controls tone and explanation style.
  style: >
    Explain technical concepts clearly and enthusiastically, like Richard Feynman
    explaining physics — precise, insightful, and accessible to a senior engineer
    who is not a specialist in every sub-field. Focus on engineering applications,
    practical impact, and how methods connect to real design and manufacturing challenges.
