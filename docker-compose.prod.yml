# Production stack — Jekyll blog + daily cron summariser.
# SSL and domain routing are handled by the external Nginx Proxy Manager;
# this stack only needs to expose port 4000 on the LXC host.

services:
  blog:
    build:
      context: .
      dockerfile: Dockerfile.jekyll
    ports:
      - "4000:4000"
    volumes:
      - ./blog:/srv/jekyll
    environment:
      - JEKYLL_ENV=production
      - MIXPANEL_TOKEN=${MIXPANEL_TOKEN}
    restart: unless-stopped
    networks:
      - web

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    volumes:
      - ./blog/_posts:/app/blog/_posts  # write posts into the Jekyll tree
      - ./data:/app/data                 # pickle cache
      - ./config.yaml:/app/config.yaml:ro
    environment:
      - PROJECT_ENV=prod
      - PROJECT_DIR=/app
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o-mini}
    # supercronic runs the crontab on the defined schedule
    command: supercronic /app/api/crontab
    restart: unless-stopped
    networks:
      - web

networks:
  web:
    driver: bridge
